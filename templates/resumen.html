<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Resumen — Gastos Cadenas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<style>
.main{padding:16px;max-width:1000px;margin:0 auto;}
select{width:auto;min-width:280px;}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px;}
.stat{background:#fff;border:1px solid #E8EDF5;border-radius:10px;padding:16px;text-align:center;box-shadow:0 2px 8px rgba(0,28,75,.06);}
.stat .n{font-size:22px;font-weight:700;}
.stat .l{font-size:11px;color:#94A3B8;margin-top:4px;}
th:nth-child(4),th:nth-child(5),th:nth-child(6),th:nth-child(7){text-align:right;}
td:nth-child(3){text-align:center;}
td:nth-child(4),td:nth-child(5),td:nth-child(6),td:nth-child(7){text-align:right;font-variant-numeric:tabular-nums;}
tfoot td:nth-child(4),tfoot td:nth-child(5),tfoot td:nth-child(6),tfoot td:nth-child(7){text-align:right;}
.tr-cadena td{background:#EEF2F7;font-weight:700;}
.pos{color:#16A34A;font-weight:700;}
.neg{color:#DC2626;font-weight:700;}
@media print{
  .card > div:first-child, .stats { display:none !important; }
  .print-bar-wrap { display:none !important; }
  .card { box-shadow:none !important; border:none !important; }
}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-left"><img src="{{ url_for('static', filename='ATO.jpeg') }}" alt="ATO" class="topbar-logo" style="height:40px;width:auto;"></div>
  <h1 class="topbar-title">GASTOS CADENAS</h1>
  <button class="nav-toggle" onclick="this.closest('.topbar').classList.toggle('nav-open')" aria-label="Menu"><span></span><span></span><span></span></button>
    <nav>
    <a href="/balance">Balance</a>
    <a href="/gastos">Gastos</a>
    <a href="/comisiones">Comisiones</a>
    <a href="/comisiones-extra">Comisiones Extra</a>
    <a href="/telcel">Telcel</a>
    <a href="/tiendas">Tiendas</a>
    <a href="/promotores">Promotores</a>
    <a href="/resumen" class="active">Resumen</a>
  </nav>
</div>
<div class="print-logo">
  <img src="{{ url_for('static', filename='ATO.jpeg') }}" alt="ATO" style="height:50px;width:auto;">
  <div><span class="print-empresa">GASTOS CADENAS</span><div class="print-semana" id="print-semana-lbl"></div></div>
</div>
<div class="main">
  <div class="card">
    <div style="display:flex;align-items:flex-end;gap:12px;margin-bottom:16px;flex-wrap:wrap;">
      <div>
        <label>Semana</label>
        <select id="sel-semana" onchange="cargarResumen()">
          <option value="">— Selecciona semana —</option>
          {% for s in semanas %}
          <option value="{{ s.id }}">{{ s.fecha_inicio }} al {{ s.fecha_fin }}</option>
          {% endfor %}
        </select>
      </div>
    </div>

    <div class="stats" id="stats" style="display:none;">
      <div class="stat">
        <div class="n" id="st-gastos" style="color:#E74C3C;">$0</div>
        <div class="l">Total gastos</div>
      </div>
      <div class="stat">
        <div class="n" id="st-ingresos" style="color:#27AE60;">$0</div>
        <div class="l">Ingresos Telcel</div>
      </div>
      <div class="stat">
        <div class="n" id="st-util">$0</div>
        <div class="l">Utilidad neta</div>
      </div>
    </div>

    <div class="spinner" id="spinner">Cargando resumen...</div>
    <div class="print-bar-wrap no-print" id="print-bar" style="display:none;justify-content:flex-end;margin-bottom:8px;">
      <button class="btn btn-naranja" onclick="window.print()">🖨 Imprimir PDF</button>
    </div>
    <div id="tabla-container">
      <div class="empty">Selecciona una semana para ver el resumen</div>
    </div>
  </div>
</div>

<script>
const f$ = n => '$' + parseFloat(n||0).toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2});

async function cargarResumen() {
  const sid = document.getElementById('sel-semana').value;
  if (!sid) {
    document.getElementById('tabla-container').innerHTML = '<div class="empty">Selecciona una semana para ver el resumen</div>';
    document.getElementById('stats').style.display = 'none';
    document.getElementById('print-bar').style.display = 'none';
    return;
  }
  document.getElementById('spinner').style.display = 'block';
  document.getElementById('tabla-container').innerHTML = '';
  document.getElementById('stats').style.display = 'none';

  let rows, todasTiendas;
  try {
    const [resR, tiendasR] = await Promise.all([
      fetch(`/api/resumen/${sid}`),
      fetch('/api/tiendas')
    ]);
    rows         = await resR.json();
    todasTiendas = await tiendasR.json();
  } catch(e) {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('tabla-container').innerHTML = `<div class="empty">Error al cargar: ${e.message}</div>`;
    return;
  }
  document.getElementById('spinner').style.display = 'none';

  if (!Array.isArray(rows) || !rows.length) {
    document.getElementById('tabla-container').innerHTML = '<div class="empty">Sin datos para esta semana. Genera los gastos primero.</div>';
    return;
  }

  rows.sort((a,b) => (a.cadena + a.tienda).localeCompare(b.cadena + b.tienda));

  let totalGastos = 0, totalIngresos = 0;

  let html = `<div style="overflow-x:auto;"><table>
    <thead><tr>
      <th>Cadena</th><th>Tienda</th><th>Proms</th>
      <th>Gastos</th><th>Ingresos Telcel</th><th>Utilidad</th><th>%</th>
    </tr></thead><tbody>`;

  rows.forEach(t => {
    const pct = t.gastos > 0 ? ((t.utilidad / t.gastos) * 100).toFixed(1) : '—';
    const uClass = t.utilidad >= 0 ? 'pos' : 'neg';
    totalGastos  += t.gastos;
    totalIngresos += t.ingresos;
    html += `<tr>
      <td>${t.cadena}</td>
      <td>${t.tienda}</td>
      <td style="text-align:center;">${t.promotores}</td>
      <td>${f$(t.gastos)}</td>
      <td>${f$(t.ingresos)}</td>
      <td class="${uClass}">${f$(t.utilidad)}</td>
      <td class="${uClass}" style="font-size:11px;">${pct}${pct!=='—'?'%':''}</td>
    </tr>`;
  });

  const totalUtil = totalIngresos - totalGastos;
  const totalPct = totalGastos > 0 ? ((totalUtil/totalGastos)*100).toFixed(1) : '—';

  html += `</tbody><tfoot><tr>
    <td colspan="3">TOTAL GENERAL</td>
    <td>${f$(totalGastos)}</td>
    <td>${f$(totalIngresos)}</td>
    <td>${f$(totalUtil)}</td>
    <td style="font-size:11px;">${totalPct}${totalPct!=='—'?'%':''}</td>
  </tr></tfoot></table></div>`;

  // Tiendas sin actividad
  const activeIds    = new Set(rows.map(r => r.id));
  const sinActividad = todasTiendas
    .filter(t => !activeIds.has(t.id))
    .sort((a,b) => (a.cadena + a.nombre).localeCompare(b.cadena + b.nombre));

  if (sinActividad.length) {
    html += `<div style="overflow-x:auto;">
    <table style="margin-top:0;">
      <tbody>
        <tr>
          <td colspan="7" style="background:#F1F5F9;color:#64748B;font-size:10px;
              font-weight:700;letter-spacing:.8px;text-transform:uppercase;
              padding:8px 12px;border-top:2px solid #CBD5E1;">
            Sin actividad &mdash; ${sinActividad.length} tiendas
          </td>
        </tr>`;
    sinActividad.forEach(t => {
      html += `<tr>
        <td style="color:#94A3B8;">${t.cadena}</td>
        <td style="color:#94A3B8;font-weight:400;">${t.nombre}</td>
        <td style="text-align:center;color:#CBD5E1;">—</td>
        <td style="text-align:right;color:#CBD5E1;">—</td>
        <td style="text-align:right;color:#CBD5E1;">—</td>
        <td style="text-align:right;color:#CBD5E1;">—</td>
        <td style="text-align:right;color:#CBD5E1;">—</td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
  }

  document.getElementById('tabla-container').innerHTML = html;

  // Botón imprimir + label semana
  const sel = document.getElementById('sel-semana');
  document.getElementById('print-semana-lbl').textContent =
    'Resumen — ' + sel.options[sel.selectedIndex].text;
  document.getElementById('print-bar').style.display = 'flex';

  // Stats cards
  document.getElementById('st-gastos').textContent = f$(totalGastos);
  document.getElementById('st-ingresos').textContent = f$(totalIngresos);
  const utilEl = document.getElementById('st-util');
  utilEl.textContent = f$(totalUtil);
  utilEl.style.color = totalUtil >= 0 ? '#27AE60' : '#E74C3C';
  document.getElementById('stats').style.display = 'grid';
}

if (document.getElementById('sel-semana').value) cargarResumen();
</script>
</body>
</html>
