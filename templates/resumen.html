<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Resumen — Gastos Cadenas</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif;}
body{background:#EEF2F7;color:#1A1A1A;}
.topbar{background:#1a5276;color:#fff;padding:11px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.topbar h1{font-size:15px;font-weight:700;}
nav a{color:#fff;text-decoration:none;margin-left:14px;font-size:13px;opacity:.75;}
nav a:hover,nav a.active{opacity:1;font-weight:700;}
.main{padding:16px;max-width:1000px;margin:0 auto;}
.card{background:#fff;border:1px solid #D8E2F0;border-radius:10px;padding:16px;margin-bottom:14px;}
h2{font-size:14px;font-weight:700;color:#1a5276;margin-bottom:12px;}
label{display:block;font-size:11px;color:#555;margin-bottom:4px;font-weight:700;text-transform:uppercase;}
select{padding:8px 10px;border:1.5px solid #D0D9E8;border-radius:7px;font-size:13px;background:#fff;min-width:280px;}
select:focus{outline:none;border-color:#1a5276;}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px;}
.stat{background:#fff;border:1px solid #D8E2F0;border-radius:10px;padding:14px;text-align:center;}
.stat .n{font-size:22px;font-weight:700;}
.stat .l{font-size:11px;color:#888;margin-top:3px;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{background:#1a5276;color:#fff;padding:8px 8px;text-align:right;white-space:nowrap;}
th:first-child,th:nth-child(2){text-align:left;}
th:nth-child(3){text-align:center;}
td{padding:7px 8px;border-bottom:1px solid #F0F4F9;text-align:right;white-space:nowrap;}
td:first-child,td:nth-child(2){text-align:left;}
td:nth-child(3){text-align:center;}
tr:hover td{background:#F5F8FC;}
.tr-cadena td{background:#EEF2F7;font-weight:700;}
tfoot td{background:#1a5276;color:#fff;font-weight:700;border-top:2px solid #1a5276;}
.pos{color:#27AE60;font-weight:700;}
.neg{color:#E74C3C;font-weight:700;}
.empty{text-align:center;padding:2rem;color:#aaa;font-size:13px;}
.spinner{display:none;text-align:center;padding:2rem;color:#1a5276;font-size:13px;}
</style>
</head>
<body>
<div class="topbar">
  <h1>GASTOS CADENAS</h1>
  <nav>
    <a href="/promotores">Promotores</a>
    <a href="/tiendas">Tiendas</a>
    <a href="/gastos">Gastos</a>
    <a href="/telcel">Telcel</a>
    <a href="/resumen" class="active">Resumen</a>
  </nav>
</div>
<div class="main">
  <div class="card">
    <div style="display:flex;align-items:flex-end;gap:12px;margin-bottom:16px;flex-wrap:wrap;">
      <div>
        <label>Semana</label>
        <select id="sel-semana" onchange="cargarResumen()">
          <option value="">— Selecciona semana —</option>
          {% for s in semanas %}
          <option value="{{ s.id }}">{{ s.fecha_inicio }} al {{ s.fecha_fin }}</option>
          {% endfor %}
        </select>
      </div>
    </div>

    <div class="stats" id="stats" style="display:none;">
      <div class="stat">
        <div class="n" id="st-gastos" style="color:#E74C3C;">$0</div>
        <div class="l">Total gastos</div>
      </div>
      <div class="stat">
        <div class="n" id="st-ingresos" style="color:#27AE60;">$0</div>
        <div class="l">Ingresos Telcel</div>
      </div>
      <div class="stat">
        <div class="n" id="st-util">$0</div>
        <div class="l">Utilidad neta</div>
      </div>
    </div>

    <div class="spinner" id="spinner">Cargando resumen...</div>
    <div id="tabla-container">
      <div class="empty">Selecciona una semana para ver el resumen</div>
    </div>
  </div>
</div>

<script>
const f$ = n => '$' + parseFloat(n||0).toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2});

async function cargarResumen() {
  const sid = document.getElementById('sel-semana').value;
  if (!sid) {
    document.getElementById('tabla-container').innerHTML = '<div class="empty">Selecciona una semana para ver el resumen</div>';
    document.getElementById('stats').style.display = 'none';
    return;
  }
  document.getElementById('spinner').style.display = 'block';
  document.getElementById('tabla-container').innerHTML = '';
  document.getElementById('stats').style.display = 'none';

  const r = await fetch(`/api/resumen/${sid}`);
  const rows = await r.json();
  document.getElementById('spinner').style.display = 'none';

  if (!rows.length) {
    document.getElementById('tabla-container').innerHTML = '<div class="empty">Sin datos para esta semana. Genera los gastos primero.</div>';
    return;
  }

  // Agrupar por cadena
  const cadenas = {};
  rows.forEach(r => {
    if (!cadenas[r.cadena]) cadenas[r.cadena] = [];
    cadenas[r.cadena].push(r);
  });

  let totalGastos = 0, totalIngresos = 0;

  let html = `<div style="overflow-x:auto;"><table>
    <thead><tr>
      <th>Cadena</th><th>Tienda</th><th>Proms</th>
      <th>Gastos</th><th>Ingresos Telcel</th><th>Utilidad</th><th>%</th>
    </tr></thead><tbody>`;

  Object.entries(cadenas).forEach(([cadena, tiendas]) => {
    const cGastos = tiendas.reduce((a,t) => a + t.gastos, 0);
    const cIngresos = tiendas.reduce((a,t) => a + t.ingresos, 0);
    const cUtil = cIngresos - cGastos;
    const cPct = cGastos > 0 ? ((cUtil / cGastos) * 100).toFixed(1) : '—';
    totalGastos += cGastos;
    totalIngresos += cIngresos;

    tiendas.forEach(t => {
      const pct = t.gastos > 0 ? ((t.utilidad / t.gastos) * 100).toFixed(1) : '—';
      const uClass = t.utilidad >= 0 ? 'pos' : 'neg';
      html += `<tr>
        <td>${cadena}</td>
        <td>${t.tienda}</td>
        <td style="text-align:center;">${t.promotores}</td>
        <td>${f$(t.gastos)}</td>
        <td>${f$(t.ingresos)}</td>
        <td class="${uClass}">${f$(t.utilidad)}</td>
        <td class="${uClass}" style="font-size:11px;">${pct}${pct!=='—'?'%':''}</td>
      </tr>`;
    });

    // Fila subtotal por cadena
    const subClass = cUtil >= 0 ? 'pos' : 'neg';
    html += `<tr class="tr-cadena">
      <td colspan="3">Subtotal ${cadena}</td>
      <td>${f$(cGastos)}</td>
      <td>${f$(cIngresos)}</td>
      <td class="${subClass}">${f$(cUtil)}</td>
      <td class="${subClass}" style="font-size:11px;">${cPct}${cPct!=='—'?'%':''}</td>
    </tr>`;
  });

  const totalUtil = totalIngresos - totalGastos;
  const totalPct = totalGastos > 0 ? ((totalUtil/totalGastos)*100).toFixed(1) : '—';

  html += `</tbody><tfoot><tr>
    <td colspan="3">TOTAL GENERAL</td>
    <td>${f$(totalGastos)}</td>
    <td>${f$(totalIngresos)}</td>
    <td>${f$(totalUtil)}</td>
    <td style="font-size:11px;">${totalPct}${totalPct!=='—'?'%':''}</td>
  </tr></tfoot></table></div>`;

  document.getElementById('tabla-container').innerHTML = html;

  // Stats cards
  document.getElementById('st-gastos').textContent = f$(totalGastos);
  document.getElementById('st-ingresos').textContent = f$(totalIngresos);
  const utilEl = document.getElementById('st-util');
  utilEl.textContent = f$(totalUtil);
  utilEl.style.color = totalUtil >= 0 ? '#27AE60' : '#E74C3C';
  document.getElementById('stats').style.display = 'grid';
}

if (document.getElementById('sel-semana').value) cargarResumen();
</script>
</body>
</html>
