<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gastos — Gastos Cadenas</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif;}
body{background:#EEF2F7;color:#1A1A1A;}
.topbar{background:#1a5276;color:#fff;padding:11px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.topbar h1{font-size:15px;font-weight:700;}
nav a{color:#fff;text-decoration:none;margin-left:14px;font-size:13px;opacity:.75;}
nav a:hover,nav a.active{opacity:1;font-weight:700;}
.main{padding:16px;max-width:1100px;margin:0 auto;}

/* Controls */
.controls{display:flex;align-items:flex-end;gap:10px;flex-wrap:wrap;margin-bottom:14px;background:#fff;border:1px solid #D8E2F0;border-radius:10px;padding:14px;}
.controls label{display:block;font-size:11px;color:#555;margin-bottom:4px;font-weight:700;text-transform:uppercase;}
.controls select{padding:8px 10px;border:1.5px solid #D0D9E8;border-radius:7px;font-size:13px;background:#fff;min-width:280px;}
.controls select:focus{outline:none;border-color:#1a5276;}
.btn{padding:8px 16px;font-size:13px;font-weight:700;border:none;border-radius:7px;cursor:pointer;transition:opacity .15s;white-space:nowrap;}
.btn:hover{opacity:.85;}
.btn:disabled{background:#C5D0E0;cursor:not-allowed;opacity:1;}
.btn-azul{background:#1a5276;color:#fff;}
.btn-verde{background:#27AE60;color:#fff;}
.btn-gris{background:#EEF2F7;color:#444;border:1px solid #D0D9E8;}

/* Counter */
.counter{background:linear-gradient(135deg,#1a5276 0%,#21618C 100%);color:#fff;border-radius:12px;padding:22px 24px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.counter-left .lbl{font-size:11px;opacity:.7;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.counter-left .total{font-size:44px;font-weight:700;letter-spacing:-1px;line-height:1;}
.counter-left .sub{font-size:12px;opacity:.65;margin-top:5px;}
.counter-right{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.mini-stat{background:rgba(255,255,255,.12);border-radius:8px;padding:9px 14px;text-align:center;}
.mini-stat .n{font-size:16px;font-weight:700;}
.mini-stat .l{font-size:10px;opacity:.7;margin-top:2px;}

/* Tabs */
.tabs-wrap{background:#fff;border:1px solid #D8E2F0;border-radius:10px;padding:12px 14px 0;margin-bottom:0;}
.tabs{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:0;}
.tab{padding:7px 14px;border-radius:7px 7px 0 0;border:1.5px solid #D0D9E8;border-bottom:none;font-size:12px;font-weight:700;cursor:pointer;background:#EEF2F7;color:#666;transition:all .15s;}
.tab:hover{border-color:#1a5276;color:#1a5276;background:#fff;}
.tab.active{background:#1a5276;color:#fff;border-color:#1a5276;}

/* Tab content */
.tab-body{background:#fff;border:1px solid #D8E2F0;border-top:3px solid #1a5276;border-radius:0 0 10px 10px;padding:0;margin-bottom:14px;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{background:#f5f8fc;color:#1a5276;padding:9px 10px;text-align:left;border-bottom:2px solid #D8E2F0;white-space:nowrap;font-size:11px;text-transform:uppercase;letter-spacing:.3px;}
th:last-child{text-align:right;}
td{padding:8px 10px;border-bottom:1px solid #F0F4F9;vertical-align:middle;}
td:last-child{text-align:right;font-variant-numeric:tabular-nums;font-weight:600;}
td:first-child{font-weight:700;color:#1a5276;}
tr:hover td{background:#F5F8FC;}
tfoot td{background:#EEF2F7;font-weight:700;border-top:2px solid #D8E2F0;padding:10px 10px;}
tfoot td:last-child{color:#1a5276;font-size:14px;}
.empty{padding:3rem;text-align:center;color:#aaa;font-size:13px;}

/* Modal */
.modal-bg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center;}
.modal-bg.show{display:flex;}
.modal{background:#fff;border-radius:12px;padding:22px;width:380px;box-shadow:0 8px 32px rgba(0,0,0,.2);}
.modal h3{font-size:14px;font-weight:700;color:#1a5276;margin-bottom:14px;}
.frow{margin-bottom:12px;}
.frow label{display:block;font-size:11px;color:#555;margin-bottom:4px;font-weight:700;text-transform:uppercase;}
.frow input,.frow select{width:100%;padding:8px 10px;border:1.5px solid #D0D9E8;border-radius:7px;font-size:13px;}
.frow input:focus{outline:none;border-color:#1a5276;}
.preview-sem{background:#EEF2F7;border-radius:7px;padding:10px 12px;font-size:13px;font-weight:700;color:#1a5276;margin-top:8px;min-height:36px;}
.btns{display:flex;gap:8px;margin-top:16px;}
</style>
</head>
<body>
<div class="topbar">
  <h1>GASTOS CADENAS</h1>
  <nav>
    <a href="/promotores">Promotores</a>
    <a href="/tiendas">Tiendas</a>
    <a href="/gastos" class="active">Gastos</a>
    <a href="/telcel">Telcel</a>
    <a href="/resumen">Resumen</a>
  </nav>
</div>
<div class="main">

  <!-- Controls -->
  <div class="controls">
    <div>
      <label>Semana</label>
      <select id="sel-semana" onchange="onSemanaChange()">
        <option value="">Cargando semanas...</option>
      </select>
    </div>
    <button class="btn btn-azul" onclick="abrirModalSemana()">+ Nueva semana</button>
    <button class="btn btn-verde" id="btn-generar" onclick="generarGastos()" disabled>⚙ Generar / Actualizar</button>
  </div>

  <!-- Contador -->
  <div class="counter">
    <div class="counter-left">
      <div class="lbl">Total semana seleccionada</div>
      <div class="total" id="counter-total">$0.00</div>
      <div class="sub" id="counter-sub">Selecciona una semana</div>
    </div>
    <div class="counter-right" id="counter-mini">
      <div class="mini-stat"><div class="n" id="mn-proms">0</div><div class="l">Promotores</div></div>
      <div class="mini-stat"><div class="n" id="mn-tiendas">0</div><div class="l">Tiendas</div></div>
      <div class="mini-stat"><div class="n" id="mn-cadenas">0</div><div class="l">Cadenas</div></div>
      <div class="mini-stat"><div class="n" id="mn-seguros">0</div><div class="l">Con seguro</div></div>
    </div>
  </div>

  <!-- Pestañas -->
  <div class="tabs-wrap">
    <div class="tabs" id="tabs-bar"></div>
  </div>
  <div class="tab-body">
    <div id="tab-content"><div class="empty">Selecciona una semana y presiona "Generar / Actualizar".</div></div>
  </div>

</div>

<!-- Modal nueva semana -->
<div class="modal-bg" id="modal-sem">
<div class="modal">
  <h3>Nueva semana</h3>
  <div class="frow">
    <label>Selecciona cualquier día de la semana</label>
    <input type="date" id="ns-dia" oninput="actuPreview()">
    <div class="preview-sem" id="ns-preview">—</div>
  </div>
  <input type="hidden" id="ns-inicio">
  <input type="hidden" id="ns-fin">
  <div class="btns">
    <button class="btn btn-azul" onclick="guardarSemana()">Crear semana</button>
    <button class="btn btn-gris" onclick="cerrarModal()">Cancelar</button>
  </div>
</div>
</div>

<script>
// ── Config pestañas ────────────────────────────────────────────────────────
const TABS = [
  {key:'sueldo_semanal',     label:'Sueldos'},
  {key:'comisiones',         label:'Comisiones'},
  {key:'seguro',             label:'Seguro'},
  {key:'isn',                label:'ISN'},
  {key:'impuestos',          label:'Impuestos'},
  {key:'gastos_indirectos',  label:'Gastos Indirectos'},
  {key:'fondo_contingencia', label:'Fondo Contingencia'},
  {key:'aguinaldo',          label:'Aguinaldo'},
  {key:'vacaciones',         label:'Vacaciones'},
  {key:'prima_vacacional',   label:'Prima Vacacional'},
];

let detalleData = [];
let tabActivo   = 'sueldo_semanal';
let semLabel    = '';

// ── Utilidades ─────────────────────────────────────────────────────────────
const f$ = n => '$' + parseFloat(n||0).toLocaleString('es-MX', {minimumFractionDigits:2, maximumFractionDigits:2});
const d2 = n => n.toString().padStart(2,'0');

function formatSemana(fi, ff) {
  const lun = new Date(fi + 'T12:00:00');
  const dom = new Date(ff + 'T12:00:00');
  return `Lun ${d2(lun.getDate())}/${d2(lun.getMonth()+1)} – Dom ${d2(dom.getDate())}/${d2(dom.getMonth()+1)}/${dom.getFullYear()}`;
}

function getMondaySunday(dateStr) {
  const d   = new Date(dateStr + 'T12:00:00');
  const dow = d.getDay() === 0 ? 6 : d.getDay() - 1;   // 0=lun … 6=dom
  const lun = new Date(d); lun.setDate(d.getDate() - dow);
  const dom = new Date(lun); dom.setDate(lun.getDate() + 6);
  const iso = x => x.toISOString().slice(0,10);
  return {inicio: iso(lun), fin: iso(dom)};
}

// ── Semanas ─────────────────────────────────────────────────────────────────
async function cargarSemanas() {
  const r    = await fetch('/api/semanas');
  const sems = await r.json();
  const sel  = document.getElementById('sel-semana');

  sel.innerHTML = '<option value="">— Selecciona semana —</option>';
  sems.forEach(s => {
    const opt = document.createElement('option');
    opt.value          = s.id;
    opt.dataset.inicio = s.fecha_inicio;
    opt.dataset.fin    = s.fecha_fin;
    opt.textContent    = formatSemana(s.fecha_inicio, s.fecha_fin);
    sel.appendChild(opt);
  });

  // Auto-seleccionar semana actual (lunes de hoy)
  const hoy = new Date().toISOString().slice(0,10);
  const {inicio} = getMondaySunday(hoy);
  for (const opt of sel.options) {
    if (opt.dataset.inicio === inicio) { sel.value = opt.value; break; }
  }
  if (sel.value) onSemanaChange();
  else buildTabs();   // mostrar pestañas vacías
}

async function onSemanaChange() {
  const sel = document.getElementById('sel-semana');
  const sid = sel.value;
  document.getElementById('btn-generar').disabled = !sid;

  if (!sid) {
    detalleData = []; semLabel = '';
    updateCounter(); renderTab(); return;
  }

  const opt = sel.options[sel.selectedIndex];
  semLabel  = formatSemana(opt.dataset.inicio, opt.dataset.fin);

  const r   = await fetch(`/api/gastos/${sid}/detalle`);
  detalleData = await r.json();
  updateCounter();
  renderTab();
}

// ── Generar gastos ──────────────────────────────────────────────────────────
async function generarGastos() {
  const sid = document.getElementById('sel-semana').value;
  if (!sid) return;
  const btn = document.getElementById('btn-generar');
  btn.disabled = true; btn.textContent = 'Generando...';
  try {
    const r = await fetch('/api/gastos/generar', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({semana_id: sid})
    });
    const d = await r.json();
    if (!d.ok) { alert('Error: ' + d.error); return; }
    await onSemanaChange();
  } finally {
    btn.disabled = false; btn.textContent = '⚙ Generar / Actualizar';
  }
}

// ── Contador ────────────────────────────────────────────────────────────────
function updateCounter() {
  const total    = detalleData.reduce((s,r) => s + (r.total||0), 0);
  const seguros  = detalleData.filter(r => (r.seguro||0) > 0).length;
  const tiendas  = new Set(detalleData.map(r => r.tienda)).size;
  const cadenas  = new Set(detalleData.map(r => r.cadena)).size;

  document.getElementById('counter-total').textContent = f$(total);
  document.getElementById('counter-sub').textContent   =
    detalleData.length
      ? `${detalleData.length} promotor${detalleData.length!==1?'es':''} · ${semLabel}`
      : 'Sin datos — presiona "Generar / Actualizar"';

  document.getElementById('mn-proms').textContent   = detalleData.length;
  document.getElementById('mn-tiendas').textContent = tiendas;
  document.getElementById('mn-cadenas').textContent = cadenas;
  document.getElementById('mn-seguros').textContent = seguros;
}

// ── Pestañas ────────────────────────────────────────────────────────────────
function buildTabs() {
  const bar = document.getElementById('tabs-bar');
  bar.innerHTML = TABS.map((t,i) =>
    `<button class="tab${i===0?' active':''}" onclick="setTab('${t.key}',this)">${t.label}</button>`
  ).join('');
}

function setTab(key, el) {
  tabActivo = key;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderTab();
}

function renderTab() {
  const cont = document.getElementById('tab-content');
  if (!detalleData.length) {
    cont.innerHTML = '<div class="empty">Sin datos. Presiona "Generar / Actualizar" para calcular los gastos de la semana.</div>';
    return;
  }

  const label    = TABS.find(t => t.key === tabActivo)?.label || tabActivo;
  const subtotal = detalleData.reduce((s,r) => s + (r[tabActivo]||0), 0);

  let html = `<table>
    <thead><tr>
      <th>Cadena</th><th>Tienda</th><th>Promotor</th><th>Monto</th>
    </tr></thead><tbody>`;

  detalleData.forEach(r => {
    html += `<tr>
      <td>${r.cadena}</td>
      <td style="font-weight:400;">${r.tienda}</td>
      <td style="font-weight:400;color:#1A1A1A;">${r.promotor}</td>
      <td>${f$(r[tabActivo])}</td>
    </tr>`;
  });

  html += `</tbody><tfoot><tr>
    <td colspan="3">SUBTOTAL — ${label}</td>
    <td>${f$(subtotal)}</td>
  </tr></tfoot></table>`;

  cont.innerHTML = html;
}

// ── Modal nueva semana ───────────────────────────────────────────────────────
function abrirModalSemana() {
  const hoy = new Date().toISOString().slice(0,10);
  document.getElementById('ns-dia').value = hoy;
  actuPreview();
  document.getElementById('modal-sem').classList.add('show');
}

function actuPreview() {
  const dia = document.getElementById('ns-dia').value;
  if (!dia) { document.getElementById('ns-preview').textContent = '—'; return; }
  const {inicio, fin} = getMondaySunday(dia);
  document.getElementById('ns-inicio').value = inicio;
  document.getElementById('ns-fin').value    = fin;
  document.getElementById('ns-preview').textContent = formatSemana(inicio, fin);
}

async function guardarSemana() {
  const fi = document.getElementById('ns-inicio').value;
  const ff = document.getElementById('ns-fin').value;
  if (!fi || !ff) { alert('Selecciona un día.'); return; }
  const r = await fetch('/api/semanas', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({fecha_inicio: fi, fecha_fin: ff})
  });
  const d = await r.json();
  if (d.ok) {
    cerrarModal();
    await cargarSemanas();
    // Auto-seleccionar la semana recién creada
    document.getElementById('sel-semana').value = d.id;
    await onSemanaChange();
  } else {
    alert('Error: ' + d.error);
  }
}

function cerrarModal() { document.getElementById('modal-sem').classList.remove('show'); }
document.getElementById('modal-sem').addEventListener('click', e => {
  if (e.target === e.currentTarget) cerrarModal();
});

// ── Init ─────────────────────────────────────────────────────────────────────
buildTabs();
cargarSemanas();
</script>
</body>
</html>
