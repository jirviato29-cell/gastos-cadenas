<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gastos — Gastos Cadenas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<style>
.main{padding:16px;max-width:1100px;margin:0 auto;}
.controls{display:flex;align-items:flex-end;gap:10px;flex-wrap:wrap;margin-bottom:14px;background:#fff;border:1px solid #E8EDF5;border-radius:12px;padding:14px;box-shadow:0 2px 8px rgba(0,28,75,.06);}
.controls label{font-size:11px;color:#5A6A80;margin-bottom:4px;font-weight:600;text-transform:uppercase;display:block;}
.controls select{min-width:280px;}
.btn-verde{background:#16A34A;color:#fff;}
.btn:disabled{background:#C5D0E0;cursor:not-allowed;opacity:1;}
.tabs-wrap{background:#fff;border:1px solid #E8EDF5;border-radius:12px 12px 0 0;padding:12px 14px 0;margin-bottom:0;}
.tabs{display:flex;flex-wrap:wrap;gap:5px;}
.tab{padding:7px 15px;border-radius:7px 7px 0 0;border:1.5px solid #D8E2F0;border-bottom:none;font-size:12px;font-weight:600;cursor:pointer;background:#F5F7FA;color:#64748B;transition:all .15s;font-family:'Inter',sans-serif;}
.tab:hover{border-color:#002855;color:#002855;background:#fff;}
.tab.active{background:#002855;color:#fff;border-color:#002855;}
.tab-body{background:#fff;border:1.5px solid #E8EDF5;border-top:3px solid #FF6B00;border-radius:0 0 12px 12px;margin-bottom:14px;overflow:hidden;}
th{text-align:left;}
th:last-child{text-align:right;}
td:last-child{text-align:right;font-variant-numeric:tabular-nums;font-weight:600;}
td:first-child{font-weight:600;color:#002855;}
tfoot td:last-child{font-size:14px;}
.frow label{display:block;font-size:11px;color:#5A6A80;margin-bottom:4px;font-weight:600;text-transform:uppercase;}
.frow input,.frow select{width:100%;padding:9px 12px;border:1.5px solid #D8E2F0;border-radius:8px;font-size:13px;}
.preview-sem{background:#EEF2F7;border-radius:8px;padding:10px 12px;font-size:13px;font-weight:700;color:#002855;margin-top:8px;min-height:36px;}
@media print{.controls,.tabs-wrap{display:none!important;}.tab-body{border-top:none!important;border-radius:0!important;}}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-left"><img src="{{ url_for('static', filename='ATO.jpeg') }}" alt="ATO" class="topbar-logo" style="height:40px;width:auto;"></div>
  <h1 class="topbar-title">GASTOS CADENAS</h1>
    <nav>
    <a href="/balance">Balance</a>
    <a href="/gastos" class="active">Gastos</a>
    <a href="/comisiones">Comisiones</a>
    <a href="/comisiones-extra">Comisiones Extra</a>
    <a href="/telcel">Telcel</a>
    <a href="/tiendas">Tiendas</a>
    <a href="/promotores">Promotores</a>
    <a href="/resumen">Resumen</a>
  </nav>
</div>
<div class="print-logo"><img src="{{ url_for('static', filename='ATO.jpeg') }}" alt="ATO" style="height:50px;width:auto;"><div><span class="print-empresa">GASTOS CADENAS</span><div class="print-semana" id="print-tab-info"></div></div></div>
<div class="main">

  <!-- Controls -->
  <div class="controls">
    <div>
      <label>Semana</label>
      <select id="sel-semana" onchange="onSemanaChange()">
        <option value="">Cargando semanas...</option>
      </select>
    </div>
    <button class="btn btn-azul" onclick="abrirModalSemana()">+ Nueva semana</button>
    <button class="btn btn-verde" id="btn-generar" onclick="generarGastos()" disabled>⚙ Generar / Actualizar</button>
  </div>

  <!-- Pestañas -->
  <div class="tabs-wrap">
    <div class="tabs" id="tabs-bar"></div>
  </div>
  <div class="tab-body">
    <div id="tab-content"><div class="empty">Selecciona una semana y presiona "Generar / Actualizar".</div></div>
  </div>

</div>

<!-- Modal nueva semana -->
<div class="modal-bg" id="modal-sem">
<div class="modal">
  <h3>Nueva semana</h3>
  <div class="frow">
    <label>Selecciona cualquier día de la semana</label>
    <input type="date" id="ns-dia" oninput="actuPreview()">
    <div class="preview-sem" id="ns-preview">—</div>
  </div>
  <input type="hidden" id="ns-inicio">
  <input type="hidden" id="ns-fin">
  <div class="btns">
    <button class="btn btn-azul" onclick="guardarSemana()">Crear semana</button>
    <button class="btn btn-gris" onclick="cerrarModal()">Cancelar</button>
  </div>
</div>
</div>

<script>
// ── Config pestañas ────────────────────────────────────────────────────────
const TABS = [
  {key:'resumen',            label:'Resumen'},
  {key:'sueldos_comisiones', label:'Sueldos y Comisiones'},
  {key:'seguro',             label:'Seguro'},
  {key:'isn_impuestos',      label:'Impuestos'},
  {key:'gastos_indirectos',  label:'Gastos Indirectos'},
  {key:'fondo_contingencia', label:'Fondo Contingencia'},
  {key:'aguinaldo',          label:'Aguinaldo'},
  {key:'vac_prima',          label:'Vacaciones'},
];

let detalleData = [];
let tabActivo   = 'resumen';
let semLabel    = '';

// ── Utilidades ─────────────────────────────────────────────────────────────
const f$ = n => '$' + parseFloat(n||0).toLocaleString('es-MX', {minimumFractionDigits:2, maximumFractionDigits:2});
const d2 = n => n.toString().padStart(2,'0');

function printBar() {
  return `<div class="no-print" style="display:flex;justify-content:flex-end;padding:10px 14px 2px;">
    <button onclick="imprimirTab()" style="background:#FF6B00;color:#fff;border:none;border-radius:6px;padding:6px 18px;font-size:12px;font-weight:700;cursor:pointer;">🖨 Imprimir</button>
  </div>`;
}

function imprimirTab() {
  const lbl = TABS.find(t => t.key === tabActivo)?.label || tabActivo;
  const el  = document.getElementById('print-tab-info');
  if (el) el.textContent = lbl + ' — ' + semLabel;
  window.print();
}

function formatSemana(fi, ff) {
  const lun = new Date(fi + 'T12:00:00');
  const dom = new Date(ff + 'T12:00:00');
  return `Lun ${d2(lun.getDate())}/${d2(lun.getMonth()+1)} – Dom ${d2(dom.getDate())}/${d2(dom.getMonth()+1)}/${dom.getFullYear()}`;
}

function getMondaySunday(dateStr) {
  const d   = new Date(dateStr + 'T12:00:00');
  const dow = d.getDay() === 0 ? 6 : d.getDay() - 1;   // 0=lun … 6=dom
  const lun = new Date(d); lun.setDate(d.getDate() - dow);
  const dom = new Date(lun); dom.setDate(lun.getDate() + 6);
  const iso = x => x.toISOString().slice(0,10);
  return {inicio: iso(lun), fin: iso(dom)};
}

// ── Semanas ─────────────────────────────────────────────────────────────────
async function cargarSemanas() {
  const r    = await fetch('/api/semanas');
  const sems = await r.json();
  const sel  = document.getElementById('sel-semana');

  sel.innerHTML = '<option value="">— Selecciona semana —</option>';
  sems.forEach(s => {
    const opt = document.createElement('option');
    opt.value          = s.id;
    opt.dataset.inicio = s.fecha_inicio;
    opt.dataset.fin    = s.fecha_fin;
    opt.textContent    = formatSemana(s.fecha_inicio, s.fecha_fin);
    sel.appendChild(opt);
  });

  // Auto-seleccionar semana actual (lunes de hoy)
  const hoy = new Date().toISOString().slice(0,10);
  const {inicio} = getMondaySunday(hoy);
  for (const opt of sel.options) {
    if (opt.dataset.inicio === inicio) { sel.value = opt.value; break; }
  }
  if (sel.value) onSemanaChange();
  else buildTabs();   // mostrar pestañas vacías
}

async function onSemanaChange() {
  const sel = document.getElementById('sel-semana');
  const sid = sel.value;
  document.getElementById('btn-generar').disabled = !sid;

  if (!sid) {
    detalleData = []; semLabel = '';
    updateCounter(); renderTab(); return;
  }

  const opt = sel.options[sel.selectedIndex];
  semLabel  = formatSemana(opt.dataset.inicio, opt.dataset.fin);

  const r   = await fetch(`/api/gastos/${sid}/detalle`);
  detalleData = await r.json();
  updateCounter();
  renderTab();
}

// ── Generar gastos ──────────────────────────────────────────────────────────
async function generarGastos() {
  const sid = document.getElementById('sel-semana').value;
  if (!sid) return;
  const btn = document.getElementById('btn-generar');
  btn.disabled = true; btn.textContent = 'Generando...';
  try {
    const r = await fetch('/api/gastos/generar', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({semana_id: sid})
    });
    const d = await r.json();
    if (!d.ok) { alert('Error: ' + d.error); return; }
    await onSemanaChange();
  } finally {
    btn.disabled = false; btn.textContent = '⚙ Generar / Actualizar';
  }
}

// ── Contador ────────────────────────────────────────────────────────────────
function updateCounter() {
  const total    = detalleData.reduce((s,r) => s + (r.total||0), 0);
  const seguros  = detalleData.filter(r => (r.seguro||0) > 0).length;
  const tiendas  = new Set(detalleData.map(r => r.tienda)).size;
  const cadenas  = new Set(detalleData.map(r => r.cadena)).size;

  document.getElementById('counter-total').textContent = f$(total);
  document.getElementById('counter-sub').textContent   =
    detalleData.length
      ? `${detalleData.length} promotor${detalleData.length!==1?'es':''} · ${semLabel}`
      : 'Sin datos — presiona "Generar / Actualizar"';

  document.getElementById('mn-proms').textContent   = detalleData.length;
  document.getElementById('mn-tiendas').textContent = tiendas;
  document.getElementById('mn-cadenas').textContent = cadenas;
  document.getElementById('mn-seguros').textContent = seguros;
}

// ── Pestañas ────────────────────────────────────────────────────────────────
function buildTabs() {
  const bar = document.getElementById('tabs-bar');
  bar.innerHTML = TABS.map((t,i) =>
    `<button class="tab${i===0?' active':''}" onclick="setTab('${t.key}',this)">${t.label}</button>`
  ).join('');
}

function setTab(key, el) {
  tabActivo = key;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderTab();
}

function renderResumen() {
  const cont = document.getElementById('tab-content');

  const COLS = [
    {key:'sueldo_semanal',    label:'Sueldos'},
    {key:'comisiones',        label:'Comisiones'},
    {key:'seguro',            label:'Seguro'},
    {key:'isn_impuestos',     label:'Impuestos'},
    {key:'gastos_indirectos', label:'G. Indirectos'},
    {key:'fondo_contingencia',label:'F. Contingencia'},
    {key:'aguinaldo',         label:'Aguinaldo'},
    {key:'vac_prima',         label:'Vacaciones'},
    {key:'total',             label:'Total'},
  ];

  const rows = detalleData.map(r => ({
    ...r,
    isn_impuestos: Math.round(((r.isn||0)       + (r.impuestos||0))       * 100) / 100,
    vac_prima:     Math.round(((r.vacaciones||0) + (r.prima_vacacional||0)) * 100) / 100,
  }));

  const grupos = {}, orden = [];
  rows.forEach(r => {
    const key = r.cadena + '||' + r.tienda;
    if (!grupos[key]) {
      grupos[key] = { cadena: r.cadena, tienda: r.tienda, proms: 0 };
      COLS.forEach(c => grupos[key][c.key] = 0);
      orden.push(key);
    }
    grupos[key].proms += 1;
    COLS.forEach(c => {
      grupos[key][c.key] = Math.round((grupos[key][c.key] + (r[c.key] || 0)) * 100) / 100;
    });
  });

  // Valores fijos — no vienen de gastos_semana
  orden.forEach(k => {
    const n = grupos[k].proms;
    grupos[k].isn_impuestos      = Math.round((61.54 * n + 417.05) * 100) / 100;
    grupos[k].gastos_indirectos  = 274.00;
    grupos[k].fondo_contingencia = Math.round(27.00 * n * 100) / 100;
    grupos[k].total = Math.round((
      grupos[k].sueldo_semanal + grupos[k].comisiones + grupos[k].seguro +
      grupos[k].isn_impuestos  + grupos[k].gastos_indirectos +
      grupos[k].fondo_contingencia + grupos[k].aguinaldo + grupos[k].vac_prima
    ) * 100) / 100;
  });

  const filas = orden.map(k => grupos[k])
                     .sort((a,b) => (a.cadena+a.tienda).localeCompare(b.cadena+b.tienda));

  const totales = { proms: 0 };
  COLS.forEach(c => totales[c.key] = 0);
  filas.forEach(g => {
    totales.proms += g.proms;
    COLS.forEach(c => totales[c.key] = Math.round((totales[c.key] + g[c.key]) * 100) / 100);
  });

  const ra = 'text-align:right;', ca = 'text-align:center;';

  let html = printBar() + `<div style="display:flex;gap:12px;padding:16px;background:linear-gradient(135deg,#002855 0%,#003875 100%);">
    <div style="flex:1;background:rgba(255,255,255,.15);border-radius:10px;padding:18px 12px;text-align:center;color:#fff;">
      <div style="font-size:38px;font-weight:700;line-height:1;">${filas.length}</div>
      <div style="font-size:11px;opacity:.75;margin-top:6px;text-transform:uppercase;letter-spacing:.6px;">Tiendas</div>
    </div>
    <div style="flex:2;background:rgba(255,255,255,.15);border-radius:10px;padding:18px 12px;text-align:center;color:#fff;">
      <div style="font-size:34px;font-weight:700;line-height:1;letter-spacing:-1px;">${f$(totales.total)}</div>
      <div style="font-size:11px;opacity:.75;margin-top:6px;text-transform:uppercase;letter-spacing:.6px;">Total general</div>
    </div>
  </div>`;

  html += `<div style="overflow-x:auto;"><table>
    <thead><tr>
      <th>Cadena</th><th>Tienda</th><th style="${ca}">Promotores</th>
      ${COLS.map(c => `<th style="${ra}">${c.label}</th>`).join('')}
    </tr></thead><tbody>`;

  filas.forEach(g => {
    html += `<tr>
      <td>${g.cadena}</td>
      <td style="font-weight:400;">${g.tienda}</td>
      <td style="${ca}font-weight:400;">${g.proms}</td>
      ${COLS.map(c => `<td style="${ra}">${f$(g[c.key])}</td>`).join('')}
    </tr>`;
  });

  html += `</tbody><tfoot><tr>
    <td colspan="2">TOTAL</td>
    <td style="${ca}">${totales.proms}</td>
    ${COLS.map(c => `<td style="${ra}">${f$(totales[c.key])}</td>`).join('')}
  </tr></tfoot></table></div>`;

  cont.innerHTML = html;
}

function renderVacPrima() {
  const cont = document.getElementById('tab-content');
  const ra = 'text-align:right;', ca = 'text-align:center;';

  const grupos = {}, orden = [];
  detalleData.forEach(r => {
    const key = r.cadena + '||' + r.tienda;
    if (!grupos[key]) {
      grupos[key] = { cadena: r.cadena, tienda: r.tienda, proms: 0, vac: 0, pv: 0 };
      orden.push(key);
    }
    grupos[key].proms += 1;
    grupos[key].vac = Math.round((grupos[key].vac + (r.vacaciones      || 0)) * 100) / 100;
    grupos[key].pv  = Math.round((grupos[key].pv  + (r.prima_vacacional|| 0)) * 100) / 100;
  });

  orden.forEach(k => { grupos[k].total = Math.round((grupos[k].vac + grupos[k].pv) * 100) / 100; });

  const conGasto = orden.map(k => grupos[k]).filter(g => g.total > 0)
                        .sort((a,b) => (a.cadena+a.tienda).localeCompare(b.cadena+b.tienda));
  const sinGasto = orden.map(k => grupos[k]).filter(g => g.total === 0)
                        .sort((a,b) => (a.cadena+a.tienda).localeCompare(b.cadena+b.tienda));

  const totVac   = conGasto.reduce((s,g) => Math.round((s + g.vac)   * 100) / 100, 0);
  const totPv    = conGasto.reduce((s,g) => Math.round((s + g.pv)    * 100) / 100, 0);
  const totTotal = Math.round((totVac + totPv) * 100) / 100;

  let html = printBar() + `<div style="display:flex;gap:12px;padding:16px;background:linear-gradient(135deg,#002855 0%,#003875 100%);">
    <div style="flex:1;background:rgba(255,255,255,.15);border-radius:10px;padding:18px 12px;text-align:center;color:#fff;">
      <div style="font-size:38px;font-weight:700;line-height:1;">${conGasto.length}</div>
      <div style="font-size:11px;opacity:.75;margin-top:6px;text-transform:uppercase;letter-spacing:.6px;">Tiendas con gasto</div>
    </div>
    <div style="flex:2;background:rgba(255,255,255,.15);border-radius:10px;padding:18px 12px;text-align:center;color:#fff;">
      <div style="font-size:34px;font-weight:700;line-height:1;letter-spacing:-1px;">${f$(totTotal)}</div>
      <div style="font-size:11px;opacity:.75;margin-top:6px;text-transform:uppercase;letter-spacing:.6px;">Total — Vacaciones</div>
    </div>
  </div>`;

  html += `<table>
    <thead><tr>
      <th>Cadena</th><th>Tienda</th><th style="${ca}">Promotores</th>
      <th style="${ra}">Vacaciones</th><th style="${ra}">Prima Vacacional</th><th style="${ra}">Total</th>
    </tr></thead><tbody>`;

  conGasto.forEach(g => {
    html += `<tr>
      <td>${g.cadena}</td>
      <td style="font-weight:400;">${g.tienda}</td>
      <td style="${ca}font-weight:400;">${g.proms}</td>
      <td style="${ra}">${f$(g.vac)}</td>
      <td style="${ra}">${f$(g.pv)}</td>
      <td style="${ra}">${f$(g.total)}</td>
    </tr>`;
  });

  html += `</tbody><tfoot><tr>
    <td colspan="3">SUBTOTAL — Vacaciones</td>
    <td style="${ra}">${f$(totVac)}</td>
    <td style="${ra}">${f$(totPv)}</td>
    <td style="${ra}">${f$(totTotal)}</td>
  </tr></tfoot></table>`;

  if (sinGasto.length) {
    html += `<table style="margin-top:0;border-top:none;">
      <thead><tr>
        <th colspan="6" style="background:#f0f0f0;color:#999;font-size:10px;letter-spacing:.5px;">SIN GASTO</th>
      </tr></thead><tbody>`;
    sinGasto.forEach(g => {
      html += `<tr>
        <td style="color:#aaa;">${g.cadena}</td>
        <td style="font-weight:400;color:#aaa;">${g.tienda}</td>
        <td style="${ca}color:#aaa;">${g.proms}</td>
        <td style="${ra}color:#aaa;">$0.00</td>
        <td style="${ra}color:#aaa;">$0.00</td>
        <td style="${ra}color:#aaa;">$0.00</td>
      </tr>`;
    });
    html += `</tbody></table>`;
  }

  cont.innerHTML = html;
}

function renderIsnImpuestos() {
  const cont = document.getElementById('tab-content');
  const ra = 'text-align:right;', ca = 'text-align:center;';

  const grupos = {}, orden = [];
  detalleData.forEach(r => {
    const key = r.cadena + '||' + r.tienda;
    if (!grupos[key]) {
      grupos[key] = { cadena: r.cadena, tienda: r.tienda, proms: 0, isn: 0, impuestos: 0 };
      orden.push(key);
    }
    grupos[key].proms += 1;
  });

  // ISN: $61.54 por promotor. Impuestos: $417.05 fijo por tienda (no viene de gastos_semana)
  orden.forEach(k => {
    grupos[k].isn       = Math.round(61.54 * grupos[k].proms * 100) / 100;
    grupos[k].impuestos = 417.05;
    grupos[k].total     = Math.round((grupos[k].isn + grupos[k].impuestos) * 100) / 100;
  });

  const conGasto = orden.map(k => grupos[k]).filter(g => g.total > 0)
                        .sort((a,b) => (a.cadena+a.tienda).localeCompare(b.cadena+b.tienda));
  const sinGasto = orden.map(k => grupos[k]).filter(g => g.total === 0)
                        .sort((a,b) => (a.cadena+a.tienda).localeCompare(b.cadena+b.tienda));

  const totIsn       = conGasto.reduce((s,g) => Math.round((s + g.isn)       * 100) / 100, 0);
  const totImpuestos = conGasto.reduce((s,g) => Math.round((s + g.impuestos) * 100) / 100, 0);
  const totTotal     = Math.round((totIsn + totImpuestos) * 100) / 100;

  let html = printBar() + `<div style="display:flex;gap:12px;padding:16px;background:linear-gradient(135deg,#002855 0%,#003875 100%);">
    <div style="flex:1;background:rgba(255,255,255,.15);border-radius:10px;padding:18px 12px;text-align:center;color:#fff;">
      <div style="font-size:38px;font-weight:700;line-height:1;">${conGasto.length}</div>
      <div style="font-size:11px;opacity:.75;margin-top:6px;text-transform:uppercase;letter-spacing:.6px;">Tiendas con gasto</div>
    </div>
    <div style="flex:2;background:rgba(255,255,255,.15);border-radius:10px;padding:18px 12px;text-align:center;color:#fff;">
      <div style="font-size:34px;font-weight:700;line-height:1;letter-spacing:-1px;">${f$(totTotal)}</div>
      <div style="font-size:11px;opacity:.75;margin-top:6px;text-transform:uppercase;letter-spacing:.6px;">Total — Impuestos</div>
    </div>
  </div>`;

  html += `<table>
    <thead><tr>
      <th>Cadena</th><th>Tienda</th><th style="${ca}">Promotores</th>
      <th style="${ra}">ISN</th><th style="${ra}">Impuestos</th><th style="${ra}">Total</th>
    </tr></thead><tbody>`;

  conGasto.forEach(g => {
    html += `<tr>
      <td>${g.cadena}</td>
      <td style="font-weight:400;">${g.tienda}</td>
      <td style="${ca}font-weight:400;">${g.proms}</td>
      <td style="${ra}">${f$(g.isn)}</td>
      <td style="${ra}">${f$(g.impuestos)}</td>
      <td style="${ra}">${f$(g.total)}</td>
    </tr>`;
  });

  html += `</tbody><tfoot><tr>
    <td colspan="3">SUBTOTAL — Impuestos</td>
    <td style="${ra}">${f$(totIsn)}</td>
    <td style="${ra}">${f$(totImpuestos)}</td>
    <td style="${ra}">${f$(totTotal)}</td>
  </tr></tfoot></table>`;

  if (sinGasto.length) {
    html += `<table style="margin-top:0;border-top:none;">
      <thead><tr>
        <th colspan="6" style="background:#f0f0f0;color:#999;font-size:10px;letter-spacing:.5px;">SIN GASTO</th>
      </tr></thead><tbody>`;
    sinGasto.forEach(g => {
      html += `<tr>
        <td style="color:#aaa;">${g.cadena}</td>
        <td style="font-weight:400;color:#aaa;">${g.tienda}</td>
        <td style="${ca}color:#aaa;">${g.proms}</td>
        <td style="${ra}color:#aaa;">$0.00</td>
        <td style="${ra}color:#aaa;">$0.00</td>
        <td style="${ra}color:#aaa;">$0.00</td>
      </tr>`;
    });
    html += `</tbody></table>`;
  }

  cont.innerHTML = html;
}

function renderSueldosComisiones() {
  const cont = document.getElementById('tab-content');
  const ra = 'text-align:right;', ca = 'text-align:center;';

  const grupos = {}, orden = [];
  detalleData.forEach(r => {
    const key = r.cadena + '||' + r.tienda;
    if (!grupos[key]) {
      grupos[key] = { cadena: r.cadena, tienda: r.tienda, proms: 0, sueldos: 0, comisiones: 0 };
      orden.push(key);
    }
    grupos[key].proms      += 1;
    grupos[key].sueldos    = Math.round((grupos[key].sueldos    + (r.sueldo_semanal || 0)) * 100) / 100;
    grupos[key].comisiones = Math.round((grupos[key].comisiones + (r.comisiones     || 0)) * 100) / 100;
  });

  orden.forEach(k => { grupos[k].total = Math.round((grupos[k].sueldos + grupos[k].comisiones) * 100) / 100; });

  const conGasto = orden.map(k => grupos[k]).filter(g => g.total > 0)
                        .sort((a,b) => (a.cadena+a.tienda).localeCompare(b.cadena+b.tienda));
  const sinGasto = orden.map(k => grupos[k]).filter(g => g.total === 0)
                        .sort((a,b) => (a.cadena+a.tienda).localeCompare(b.cadena+b.tienda));

  const totSueldos    = conGasto.reduce((s,g) => Math.round((s + g.sueldos)    * 100) / 100, 0);
  const totComisiones = conGasto.reduce((s,g) => Math.round((s + g.comisiones) * 100) / 100, 0);
  const totTotal      = Math.round((totSueldos + totComisiones) * 100) / 100;

  let html = printBar() + `<div style="display:flex;gap:12px;padding:16px;background:linear-gradient(135deg,#002855 0%,#003875 100%);">
    <div style="flex:1;background:rgba(255,255,255,.15);border-radius:10px;padding:18px 12px;text-align:center;color:#fff;">
      <div style="font-size:38px;font-weight:700;line-height:1;">${conGasto.length}</div>
      <div style="font-size:11px;opacity:.75;margin-top:6px;text-transform:uppercase;letter-spacing:.6px;">Tiendas con gasto</div>
    </div>
    <div style="flex:2;background:rgba(255,255,255,.15);border-radius:10px;padding:18px 12px;text-align:center;color:#fff;">
      <div style="font-size:34px;font-weight:700;line-height:1;letter-spacing:-1px;">${f$(totTotal)}</div>
      <div style="font-size:11px;opacity:.75;margin-top:6px;text-transform:uppercase;letter-spacing:.6px;">Total — Sueldos y Comisiones</div>
    </div>
  </div>`;

  html += `<table>
    <thead><tr>
      <th>Cadena</th><th>Tienda</th><th style="${ca}">Promotores</th>
      <th style="${ra}">Sueldos</th><th style="${ra}">Comisiones</th><th style="${ra}">Total</th>
    </tr></thead><tbody>`;

  conGasto.forEach(g => {
    html += `<tr>
      <td>${g.cadena}</td>
      <td style="font-weight:400;">${g.tienda}</td>
      <td style="${ca}font-weight:400;">${g.proms}</td>
      <td style="${ra}">${f$(g.sueldos)}</td>
      <td style="${ra}">${f$(g.comisiones)}</td>
      <td style="${ra}">${f$(g.total)}</td>
    </tr>`;
  });

  html += `</tbody><tfoot><tr>
    <td colspan="3">SUBTOTAL — Sueldos y Comisiones</td>
    <td style="${ra}">${f$(totSueldos)}</td>
    <td style="${ra}">${f$(totComisiones)}</td>
    <td style="${ra}">${f$(totTotal)}</td>
  </tr></tfoot></table>`;

  if (sinGasto.length) {
    html += `<table style="margin-top:0;border-top:none;">
      <thead><tr>
        <th colspan="6" style="background:#f0f0f0;color:#999;font-size:10px;letter-spacing:.5px;">SIN GASTO</th>
      </tr></thead><tbody>`;
    sinGasto.forEach(g => {
      html += `<tr>
        <td style="color:#aaa;">${g.cadena}</td>
        <td style="font-weight:400;color:#aaa;">${g.tienda}</td>
        <td style="${ca}color:#aaa;">${g.proms}</td>
        <td style="${ra}color:#aaa;">$0.00</td>
        <td style="${ra}color:#aaa;">$0.00</td>
        <td style="${ra}color:#aaa;">$0.00</td>
      </tr>`;
    });
    html += `</tbody></table>`;
  }

  cont.innerHTML = html;
}

function renderTab() {
  const cont = document.getElementById('tab-content');
  if (!detalleData.length) {
    cont.innerHTML = '<div class="empty">Sin datos. Presiona "Generar / Actualizar" para calcular los gastos de la semana.</div>';
    return;
  }

  if (tabActivo === 'resumen')            { renderResumen(); return; }
  if (tabActivo === 'sueldos_comisiones') { renderSueldosComisiones(); return; }
  if (tabActivo === 'isn_impuestos')      { renderIsnImpuestos(); return; }
  if (tabActivo === 'vac_prima')          { renderVacPrima(); return; }

  const label = TABS.find(t => t.key === tabActivo)?.label || tabActivo;

  // Agrupar por Cadena + Tienda
  const grupos = {};
  const orden  = [];
  detalleData.forEach(r => {
    const key = r.cadena + '||' + r.tienda;
    if (!grupos[key]) {
      grupos[key] = { cadena: r.cadena, tienda: r.tienda, monto: 0, proms: 0 };
      orden.push(key);
    }
    grupos[key].proms += 1;
  });

  // Valores fijos por tienda o por promotor — no vienen de gastos_semana
  if (tabActivo === 'gastos_indirectos') {
    orden.forEach(k => { grupos[k].monto = 274.00; });
  } else if (tabActivo === 'fondo_contingencia') {
    orden.forEach(k => { grupos[k].monto = Math.round(27.00 * grupos[k].proms * 100) / 100; });
  } else {
    detalleData.forEach(r => {
      const key = r.cadena + '||' + r.tienda;
      grupos[key].monto = Math.round((grupos[key].monto + (r[tabActivo] || 0)) * 100) / 100;
    });
  }

  // Separar con gasto vs sin gasto, ordenar por cadena+tienda
  const conGasto  = orden.map(k => grupos[k]).filter(g => g.monto > 0)
                        .sort((a,b) => (a.cadena+a.tienda).localeCompare(b.cadena+b.tienda));
  const sinGasto  = orden.map(k => grupos[k]).filter(g => g.monto === 0)
                        .sort((a,b) => (a.cadena+a.tienda).localeCompare(b.cadena+b.tienda));

  const total = conGasto.reduce((s,g) => Math.round((s + g.monto) * 100) / 100, 0);

  // Tarjetas de resumen
  let html = printBar() + `<div style="display:flex;gap:12px;padding:16px;background:linear-gradient(135deg,#002855 0%,#003875 100%);">
    <div style="flex:1;background:rgba(255,255,255,.15);border-radius:10px;padding:18px 12px;text-align:center;color:#fff;">
      <div style="font-size:38px;font-weight:700;line-height:1;">${conGasto.length}</div>
      <div style="font-size:11px;opacity:.75;margin-top:6px;text-transform:uppercase;letter-spacing:.6px;">Tiendas con gasto</div>
    </div>
    <div style="flex:2;background:rgba(255,255,255,.15);border-radius:10px;padding:18px 12px;text-align:center;color:#fff;">
      <div style="font-size:34px;font-weight:700;line-height:1;letter-spacing:-1px;">${f$(total)}</div>
      <div style="font-size:11px;opacity:.75;margin-top:6px;text-transform:uppercase;letter-spacing:.6px;">Total — ${label}</div>
    </div>
  </div>`;

  html += `<table>
    <thead><tr>
      <th>Cadena</th><th>Tienda</th><th>Promotores</th><th>${label}</th>
    </tr></thead><tbody>`;

  conGasto.forEach(g => {
    html += `<tr>
      <td>${g.cadena}</td>
      <td style="font-weight:400;">${g.tienda}</td>
      <td style="text-align:center;font-weight:400;">${g.proms}</td>
      <td>${f$(g.monto)}</td>
    </tr>`;
  });

  html += `</tbody><tfoot><tr>
    <td colspan="3">SUBTOTAL — ${label}</td>
    <td>${f$(total)}</td>
  </tr></tfoot></table>`;

  if (sinGasto.length) {
    html += `<table style="margin-top:0;border-top:none;">
      <thead><tr>
        <th colspan="4" style="background:#f0f0f0;color:#999;font-size:10px;letter-spacing:.5px;">SIN GASTO</th>
      </tr></thead><tbody>`;
    sinGasto.forEach(g => {
      html += `<tr>
        <td style="color:#aaa;">${g.cadena}</td>
        <td style="font-weight:400;color:#aaa;">${g.tienda}</td>
        <td style="text-align:center;color:#aaa;">${g.proms}</td>
        <td style="color:#aaa;">$0.00</td>
      </tr>`;
    });
    html += `</tbody></table>`;
  }

  cont.innerHTML = html;
}

// ── Modal nueva semana ───────────────────────────────────────────────────────
function abrirModalSemana() {
  const hoy = new Date().toISOString().slice(0,10);
  document.getElementById('ns-dia').value = hoy;
  actuPreview();
  document.getElementById('modal-sem').classList.add('show');
}

function actuPreview() {
  const dia = document.getElementById('ns-dia').value;
  if (!dia) { document.getElementById('ns-preview').textContent = '—'; return; }
  const {inicio, fin} = getMondaySunday(dia);
  document.getElementById('ns-inicio').value = inicio;
  document.getElementById('ns-fin').value    = fin;
  document.getElementById('ns-preview').textContent = formatSemana(inicio, fin);
}

async function guardarSemana() {
  const fi = document.getElementById('ns-inicio').value;
  const ff = document.getElementById('ns-fin').value;
  if (!fi || !ff) { alert('Selecciona un día.'); return; }
  const r = await fetch('/api/semanas', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({fecha_inicio: fi, fecha_fin: ff})
  });
  const d = await r.json();
  if (d.ok) {
    cerrarModal();
    await cargarSemanas();
    // Auto-seleccionar la semana recién creada
    document.getElementById('sel-semana').value = d.id;
    await onSemanaChange();
  } else {
    alert('Error: ' + d.error);
  }
}

function cerrarModal() { document.getElementById('modal-sem').classList.remove('show'); }
document.getElementById('modal-sem').addEventListener('click', e => {
  if (e.target === e.currentTarget) cerrarModal();
});

// ── Init ─────────────────────────────────────────────────────────────────────
buildTabs();
cargarSemanas();
</script>
