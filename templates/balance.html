<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Balance — Gastos Cadenas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<style>
.main{padding:24px;max-width:860px;margin:0 auto;}
.controls{display:flex;gap:12px;align-items:flex-end;margin-bottom:20px;flex-wrap:wrap;}
.controls>div{display:flex;flex-direction:column;gap:4px;}
select{min-width:300px;}
.estado{background:#fff;border:1px solid #E8EDF5;border-radius:14px;padding:40px 48px;box-shadow:0 4px 24px rgba(0,28,75,.09);}
.estado-header{text-align:center;margin-bottom:32px;padding-bottom:20px;border-bottom:2px solid #002855;}
.estado-header .empresa{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#94A3B8;margin-bottom:6px;}
.estado-header .titulo{font-size:24px;font-weight:800;color:#002855;}
.estado-header .periodo{font-size:13px;color:#64748B;margin-top:6px;font-weight:500;}
.seccion{margin-bottom:28px;}
.sec-title{font-size:14px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:#002855;margin-bottom:14px;padding-bottom:7px;border-bottom:3px solid #FF6B00;display:inline-block;}
.linea-sep{border:none;border-top:1px solid #E8EDF5;margin:8px 0;}
.fila{display:flex;align-items:baseline;padding:6px 0;font-size:13.5px;}
.fila-sub{display:flex;align-items:baseline;padding:4px 0 4px 24px;font-size:13px;}
.fila-sub .concepto{color:#64748B;}
.concepto{flex:1;color:#1A202C;}
.detalle{font-size:11px;color:#94A3B8;margin-left:6px;font-weight:400;white-space:nowrap;}
.monto{font-variant-numeric:tabular-nums;font-weight:700;white-space:nowrap;min-width:140px;text-align:right;color:#002855;}
.monto.rojo{color:#DC2626;}
.monto.verde{color:#16A34A;}
.fila-total{display:flex;align-items:baseline;padding:12px 0 8px;font-size:15px;font-weight:700;border-top:1.5px solid #CBD5E1;}
.fila-total .concepto{color:#002855;}
.fila-total .monto{font-size:16px;}
.resumen{background:linear-gradient(135deg,#002855 0%,#003D80 100%);border-radius:12px;padding:28px 36px;margin-top:4px;}
.resumen .sec-title{color:rgba(255,255,255,.9);border-bottom-color:rgba(255,107,0,.6);}
.res-fila{display:flex;align-items:baseline;padding:8px 0;font-size:14px;}
.res-fila .concepto{flex:1;color:rgba(255,255,255,.8);font-weight:500;}
.res-fila .monto{font-variant-numeric:tabular-nums;font-weight:700;min-width:160px;text-align:right;font-size:15px;color:#fff;}
.res-sep{border:none;border-top:1px solid rgba(255,255,255,.18);margin:4px 0;}
.res-doble{border:none;border-top:2px solid rgba(255,255,255,.35);margin:8px 0;}
.utilidad-fila{display:flex;align-items:baseline;padding:14px 0 6px;}
.utilidad-fila .concepto{flex:1;font-size:17px;font-weight:700;color:#fff;}
.utilidad-fila .monto{font-variant-numeric:tabular-nums;font-weight:800;font-size:28px;min-width:160px;text-align:right;}
.margen-fila{display:flex;padding:4px 0;font-size:12px;color:rgba(255,255,255,.55);}
.margen-fila span{margin-left:auto;font-weight:700;font-size:14px;color:rgba(255,255,255,.85);}
.resumen .monto.verde{color:#4ADE80;}
.resumen .monto.rojo{color:#FC8181;}
@media print{
  .estado{border:none!important;box-shadow:none!important;padding:0!important;}
  .resumen{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  /* Filas más compactas al imprimir */
  .fila{padding:2px 0;font-size:12px;}
  .fila-sub{padding:1px 0 1px 20px;font-size:11.5px;}
  .fila-total{padding:6px 0 4px;font-size:13px;}
  .concepto{flex:1;}
  .monto{min-width:120px;text-align:right;}
  .fila-total .monto{font-size:13px;}
  .seccion{margin-bottom:16px;}
  .sec-title{margin-bottom:8px;padding-bottom:4px;font-size:12px;}
  .linea-sep{margin:4px 0;}
  .res-fila{padding:4px 0;font-size:12px;}
  .res-fila .monto{min-width:120px;font-size:12px;}
  .utilidad-fila{padding:8px 0 4px;}
  .utilidad-fila .concepto{font-size:14px;}
  .utilidad-fila .monto{font-size:20px;min-width:120px;}
  .estado-header{margin-bottom:16px;padding-bottom:12px;}
  .resumen{padding:16px 20px;}
}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-left"><img src="{{ url_for('static', filename='ATO.jpeg') }}" alt="ATO" class="topbar-logo" style="height:40px;width:auto;"></div>
  <h1 class="topbar-title">GASTOS CADENAS</h1>
  <button class="nav-toggle" onclick="this.closest('.topbar').classList.toggle('nav-open')" aria-label="Menu"><span></span><span></span><span></span></button>
    <nav>
    <a href="/balance" class="active">Balance</a>
    <a href="/gastos">Gastos</a>
    <a href="/comisiones">Comisiones</a>
    <a href="/comisiones-extra">Comisiones Extra</a>
    <a href="/telcel">Telcel</a>
    <a href="/tiendas">Tiendas</a>
    <a href="/promotores">Promotores</a>
    <a href="/resumen">Resumen</a>
  </nav>
</div>
<div class="print-logo"><img src="{{ url_for('static', filename='ATO.jpeg') }}" alt="ATO" style="height:50px;width:auto;"><div><span class="print-empresa">GASTOS CADENAS</span><div class="print-semana" id="print-semana-lbl"></div></div></div>
<div class="main">
  <div class="controls">
    <div>
      <label>Semana</label>
      <select id="sel-semana" onchange="cargar()">
        <option value="">— Selecciona semana —</option>
        {% for s in semanas %}
        <option value="{{ s.id }}">{{ s.fecha_inicio }} → {{ s.fecha_fin }}</option>
        {% endfor %}
      </select>
    </div>
    <button class="btn btn-azul no-print" id="btn-imprimir-balance" onclick="window.print()" style="display:none;">🖨 Imprimir</button>
  </div>

  <div id="contenido">
    <div class="empty">Selecciona una semana para generar el balance.</div>
  </div>
</div>

<script>
function f$(n){
  if(n == null) return '—';
  const abs = Math.abs(n);
  const fmt = '$' + abs.toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2});
  return n < 0 ? `(${fmt})` : fmt;
}
function fp(n){ return (n == null ? '0.0' : n.toFixed(1)) + '%'; }

async function cargar(){
  const sid = parseInt(document.getElementById('sel-semana').value) || 0;
  const div = document.getElementById('contenido');
  const btnImp = document.getElementById('btn-imprimir-balance');
  if(!sid){
    div.innerHTML = '<div class="empty">Selecciona una semana para generar el balance.</div>';
    if(btnImp) btnImp.style.display = 'none';
    return;
  }
  const res  = await fetch(`/api/balance/${sid}`);
  const data = await res.json();
  if(!data.ok){
    div.innerHTML = `<div class="empty">${data.error}</div>`;
    if(btnImp) btnImp.style.display = 'none';
    return;
  }

  const sel   = document.getElementById('sel-semana');
  const texto = sel.options[sel.selectedIndex].text;

  const I  = data.ingresos;
  const G  = data.gastos;
  const U  = data.utilidad;
  const M  = data.margen;
  const L  = I.telcel_lineas || {};

  // Orden preferido para productos Telcel
  const ORDEN_TELCEL = ['AMIGO KIT','CBPC','CHIP EXPRESS','GARANTIZADA'];
  const ORDEN_EXTRA  = ['2% AP','Volumen Garantizado','Amigo Kit','Cadena Comercial'];

  // Productos Telcel ordenados
  const telcelKeys = [
    ...ORDEN_TELCEL.filter(k => I.telcel[k] != null),
    ...Object.keys(I.telcel).filter(k => !ORDEN_TELCEL.includes(k)).sort()
  ];

  // Comisiones Extra ordenadas
  const extraKeys = [
    ...ORDEN_EXTRA.filter(k => I.extra[k] != null),
    ...Object.keys(I.extra).filter(k => !ORDEN_EXTRA.includes(k)).sort()
  ];

  const hayExtra = extraKeys.length > 0;

  let html = `<div class="estado">

  <div class="estado-header">
    <div class="empresa">Gastos Cadenas</div>
    <div class="titulo">Estado de Resultados</div>
    <div class="periodo">${texto}</div>
  </div>

  <!-- INGRESOS -->
  <div class="seccion">
    <div class="sec-title">Ingresos</div>
    <hr class="linea-sep">`;

  telcelKeys.forEach(k => {
    const lineas = L[k] ? `<span class="detalle">(${L[k].toLocaleString('es-MX')} líneas)</span>` : '';
    html += `
    <div class="fila">
      <span class="concepto">${cap(k)}${lineas}</span>
      <span class="monto">${f$(I.telcel[k])}</span>
    </div>`;
  });

  if(hayExtra){
    html += `
    <div class="fila" style="margin-top:6px;">
      <span class="concepto" style="font-weight:600;color:#002855;">Comisiones Extra</span>
      <span class="monto"></span>
    </div>`;
    extraKeys.forEach(k => {
      html += `
    <div class="fila-sub">
      <span class="concepto">· ${k}</span>
      <span class="monto">${f$(I.extra[k])}</span>
    </div>`;
    });
  }

  html += `
    <hr class="linea-sep" style="margin-top:10px;">
    <div class="fila-total">
      <span class="concepto">Total Ingresos</span>
      <span class="monto">${f$(I.total)}</span>
    </div>
  </div>

  <!-- GASTOS -->
  <div class="seccion">
    <div class="sec-title">Gastos</div>
    <hr class="linea-sep">

    <div class="fila">
      <span class="concepto">Sueldos<span class="detalle">(${G.n_prom} promotores)</span></span>
      <span class="monto rojo">${f$(G.sueldos)}</span>
    </div>`;

  if(G.comisiones > 0) html += `
    <div class="fila">
      <span class="concepto">Comisiones<span class="detalle">(${G.n_com} promotores)</span></span>
      <span class="monto rojo">${f$(G.comisiones)}</span>
    </div>`;

  if(G.seguro > 0) html += `
    <div class="fila">
      <span class="concepto">Seguro Social<span class="detalle">(${G.n_seg} con seguro)</span></span>
      <span class="monto rojo">${f$(G.seguro)}</span>
    </div>`;

  html += `
    <div class="fila">
      <span class="concepto">ISN<span class="detalle">(${G.n_prom} promotores)</span></span>
      <span class="monto rojo">${f$(G.isn)}</span>
    </div>
    <div class="fila">
      <span class="concepto">Impuestos<span class="detalle">(${G.n_tiend} tiendas)</span></span>
      <span class="monto rojo">${f$(G.impuestos)}</span>
    </div>
    <div class="fila">
      <span class="concepto">Gastos Indirectos<span class="detalle">(${G.n_tiend} tiendas)</span></span>
      <span class="monto rojo">${f$(G.gastos_indirectos)}</span>
    </div>
    <div class="fila">
      <span class="concepto">Fondo de Contingencia<span class="detalle">(${G.n_prom} promotores)</span></span>
      <span class="monto rojo">${f$(G.fondo_contingencia)}</span>
    </div>
    <div class="fila">
      <span class="concepto">Aguinaldo<span class="detalle">(${G.n_prom} promotores)</span></span>
      <span class="monto rojo">${f$(G.aguinaldo)}</span>
    </div>`;

  if(G.vacaciones > 0) html += `
    <div class="fila">
      <span class="concepto">Vacaciones<span class="detalle">(${G.n_vac} promotores)</span></span>
      <span class="monto rojo">${f$(G.vacaciones)}</span>
    </div>`;

  if(G.prima_vacacional > 0) html += `
    <div class="fila">
      <span class="concepto">Prima Vacacional<span class="detalle">(${G.n_pv} promotores)</span></span>
      <span class="monto rojo">${f$(G.prima_vacacional)}</span>
    </div>`;

  html += `
    <hr class="linea-sep" style="margin-top:10px;">
    <div class="fila-total">
      <span class="concepto">Total Gastos</span>
      <span class="monto rojo">${f$(G.total)}</span>
    </div>
  </div>

  <!-- RESUMEN EJECUTIVO -->
  <div class="resumen">
    <div class="sec-title" style="margin-bottom:14px;">Resumen Ejecutivo</div>

    <div class="res-fila">
      <span class="concepto">Total Ingresos</span>
      <span class="monto" style="color:#1A7A3A;">${f$(I.total)}</span>
    </div>
    <div class="res-fila">
      <span class="concepto">Total Gastos</span>
      <span class="monto rojo">${f$(G.total)}</span>
    </div>
    <hr class="res-sep">
    <div class="utilidad-fila">
      <span class="concepto">Utilidad Neta</span>
      <span class="monto ${U >= 0 ? 'verde' : 'rojo'}">${f$(U)}</span>
    </div>
    <div class="margen-fila">
      <span>Margen</span>
      <span style="color:${M >= 0 ? '#1A7A3A' : '#C0392B'}">${fp(M)}</span>
    </div>
    <hr class="res-doble">
  </div>

</div>`;

  div.innerHTML = html;
  const sl = document.getElementById('print-semana-lbl');
  if (sl) sl.textContent = 'Balance — ' + texto;
  const btn = document.getElementById('btn-imprimir-balance');
  if (btn) btn.style.display = '';
}

function cap(s){
  return s.toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
}
</script>
</body>
</html>
